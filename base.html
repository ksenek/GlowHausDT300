<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>GlossHaus | home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" type="text/css">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-inner">

            <div class="navbar-left">
                <img src="{{ url_for('static', filename='images/glosshaus_logo.png') }}" alt="GlossHaus Logo" class="logo">
                <span class="brand-name">GlossHaus</span>
            </div>

            <div class="navbar-center">
                <input type="text" placeholder="Search skincare, makeup, fragrance..." class="search-bar">
            </div>

            <div class="navbar-right">
                <a href="/">Home</a>
                <a href="/products">Shop</a>
                <a href="/contact">Contact</a>
            </div>

        </div>
    </nav>

    <div class="container">
        <header>
            <h1>GlossHaus</h1>
            <h2>{% block pageheading %}{% endblock %}</h2>
        </header>

        <main>
            {% block main %}
            {% endblock %}
        </main>
    </div>
</body>

</html>
